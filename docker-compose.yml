services:
  db:
    image: pgvector/pgvector:pg16
    container_name: xsaved-rag-db
    environment:
      POSTGRES_USER: xsaved
      POSTGRES_PASSWORD: xsaved
      POSTGRES_DB: xsaved_rag
    ports:
      - "5432:5432"
    volumes:
      - xsaved-rag-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xsaved -d xsaved_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  xsaved-rag-pgdata:
